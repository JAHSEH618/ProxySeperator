version: '3'

info:
  companyName: "friedhelmliu"
  productName: "ProxySeparator"
  productIdentifier: "com.friedhelmliu.proxyseparator"
  description: "Route company traffic through your corporate proxy and everything else through your personal proxy."
  copyright: "(c) 2026 friedhelmliu"
  comments: "Company traffic goes to the company proxy. Everything else goes to the personal proxy."
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task common:install:frontend:deps
      type: once
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: go mod tidy
      type: blocking
    - cmd: wails3 task build
      type: blocking
    - cmd: wails3 task run
      type: primary
