name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: ProxySeparator
  WAILS_VERSION: v3.0.0-alpha.64
  WINTUN_URL: https://www.wintun.net/builds/wintun-0.14.1.zip

jobs:
  build-macos:
    name: Build macOS (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: amd64
            label: amd64
          - runner: macos-15
            arch: arm64
            label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Stamp release version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/version: \".*\"/version: \"${VERSION}\"/" build/config.yml
          rm build/config.yml.bak

      - name: Run tests
        shell: bash
        run: go test ./...

      - name: Build DMG
        shell: bash
        run: |
          wails3 task darwin:create:dmg ARCH=${{ matrix.arch }}
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"
          mv "bin/${APP_NAME}.dmg" "release-assets/${APP_NAME}-${VERSION}-macos-${{ matrix.label }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.label }}
          path: release-assets/*

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Download wintun.dll
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/windows | Out-Null
          Invoke-WebRequest -Uri $env:WINTUN_URL -OutFile wintun.zip
          Expand-Archive -LiteralPath wintun.zip -DestinationPath wintun
          $dll = Get-ChildItem -Path wintun -Recurse -Filter wintun.dll | Where-Object { $_.FullName -match 'amd64' } | Select-Object -First 1
          if (-not $dll) {
            throw "wintun.dll for amd64 was not found in the downloaded archive."
          }
          Copy-Item $dll.FullName build/windows/wintun.dll

      - name: Stamp release version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/version: \".*\"/version: \"${VERSION}\"/" build/config.yml
          rm build/config.yml.bak

      - name: Run tests
        shell: bash
        run: go test ./...

      - name: Build installer
        shell: bash
        run: |
          wails3 task windows:package
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"
          mv "bin/${APP_NAME}-amd64-installer.exe" "release-assets/${APP_NAME}-${VERSION}-windows-amd64-setup.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: release-assets/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -type f \( -name "*.dmg" -o -name "*.exe" \) -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
