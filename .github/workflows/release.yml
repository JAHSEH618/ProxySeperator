name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: ProxySeparator
  WAILS_VERSION: v3.0.0-alpha.64
  WINTUN_URL: https://www.wintun.net/builds/wintun-0.14.1.zip
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: Build macOS (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: amd64
            label: x86_64
          - runner: macos-15
            arch: arm64
            label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Stamp release version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/version: \".*\"/version: \"${VERSION}\"/" build/config.yml
          rm build/config.yml.bak

      - name: Run tests
        shell: bash
        run: go test ./...

      - name: Build DMG
        shell: bash
        run: |
          wails3 task darwin:create:dmg ARCH=${{ matrix.arch }}
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET_NAME="${APP_NAME}-${VERSION}-macos-${{ matrix.label }}.dmg"
          mv "bin/${APP_NAME}.dmg" "release-assets/${ASSET_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.label }}
          path: release-assets/*

  build-windows:
    name: Build Windows (${{ matrix.label }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            label: x86_64
          - arch: arm64
            label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Download wintun.dll
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/windows | Out-Null
          Invoke-WebRequest -Uri $env:WINTUN_URL -OutFile wintun.zip
          Expand-Archive -LiteralPath wintun.zip -DestinationPath wintun
          $dll = Get-ChildItem -Path wintun -Recurse -Filter wintun.dll | Where-Object { $_.FullName -match '${{ matrix.arch }}' } | Select-Object -First 1
          if (-not $dll) {
            throw "wintun.dll for ${{ matrix.arch }} was not found in the downloaded archive."
          }
          Copy-Item $dll.FullName build/windows/wintun.dll

      - name: Stamp release version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/version: \".*\"/version: \"${VERSION}\"/" build/config.yml
          rm build/config.yml.bak

      - name: Run tests
        if: matrix.arch == 'amd64'
        shell: bash
        run: go test ./...

      - name: Build installer
        shell: pwsh
        run: |
          wails3 task windows:package ARCH=${{ matrix.arch }}
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $assetName = "$env:APP_NAME-$version-windows-${{ matrix.label }}-setup.exe"
          $exactInstallerPath = Join-Path "bin" "$env:APP_NAME-${{ matrix.arch }}-installer.exe"

          if (Test-Path -LiteralPath $exactInstallerPath) {
            $installer = Get-Item -LiteralPath $exactInstallerPath
          } else {
            $candidates = @(Get-ChildItem -Path bin -Filter "$env:APP_NAME-*-installer.exe")

            if ($candidates.Count -ne 1) {
              throw "Expected one installer for architecture ${{ matrix.arch }}, found $($candidates.Count)."
            }

            $installer = $candidates[0]
          }

          if (-not $installer) {
            throw "Installer not found under bin/ for architecture ${{ matrix.arch }}."
          }

          Move-Item -LiteralPath $installer.FullName -Destination (Join-Path "release-assets" $assetName)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.label }}
          path: release-assets/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -type f \( -name "*.dmg" -o -name "*.exe" \) -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
