name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: ProxySeparator
  WAILS_VERSION: v3.0.0-alpha.64
  WINTUN_URL: https://www.wintun.net/builds/wintun-0.14.1.zip
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-macos:
    name: Build macOS (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      ARCH: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: amd64
            label: x86_64
            macho_arch: x86_64
          - runner: macos-15
            arch: arm64
            label: arm64
            macho_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Stamp release version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/version: \".*\"/version: \"${VERSION}\"/" build/config.yml
          rm build/config.yml.bak

      - name: Run tests
        shell: bash
        run: go test ./...

      - name: Update build assets
        shell: bash
        run: wails3 task common:update:build-assets

      - name: Build DMG
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_BUNDLE_NAME="${APP_NAME}-${{ matrix.label }}"
          DMG_NAME="${APP_NAME}-${VERSION}-macos-${{ matrix.label }}"

          wails3 task common:generate:icons common:build:frontend

          if [[ "${ARCH}" == "amd64" ]]; then
            CLANG_ARCH="x86_64"
            MIN_MACOS="10.15"
          else
            CLANG_ARCH="arm64"
            MIN_MACOS="11.0"
          fi

          GOOS=darwin \
          CGO_ENABLED=1 \
          GOARCH="${ARCH}" \
          CGO_CFLAGS="-arch ${CLANG_ARCH} -mmacosx-version-min=${MIN_MACOS}" \
          CGO_LDFLAGS="-arch ${CLANG_ARCH} -mmacosx-version-min=${MIN_MACOS}" \
          MACOSX_DEPLOYMENT_TARGET="${MIN_MACOS}" \
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o "bin/${APP_NAME}" ./cmd/proxyseparator

          APP_BUNDLE_PATH="bin/${APP_BUNDLE_NAME}.app"
          rm -rf "${APP_BUNDLE_PATH}" "bin/.dmg-root" "bin/${DMG_NAME}.dmg"
          mkdir -p "${APP_BUNDLE_PATH}/Contents/MacOS" "${APP_BUNDLE_PATH}/Contents/Resources"
          cp build/darwin/icons.icns "${APP_BUNDLE_PATH}/Contents/Resources"
          cp "bin/${APP_NAME}" "${APP_BUNDLE_PATH}/Contents/MacOS/${APP_NAME}"
          cp build/darwin/Info.plist "${APP_BUNDLE_PATH}/Contents/Info.plist"
          codesign --force --deep --sign - "${APP_BUNDLE_PATH}"

          echo "Runner architecture: $(uname -m)"
          BINARY_INFO="$(file -b "${APP_BUNDLE_PATH}/Contents/MacOS/${APP_NAME}")"
          echo "Binary info: ${BINARY_INFO}"
          if [[ "${BINARY_INFO}" != *"${{ matrix.macho_arch }}"* ]]; then
            echo "Expected macOS binary architecture '${{ matrix.macho_arch }}' but got '${BINARY_INFO}'."
            exit 1
          fi

          mkdir -p bin/.dmg-root
          cp -R "${APP_BUNDLE_PATH}" bin/.dmg-root/
          hdiutil create -volname "${APP_BUNDLE_NAME}" -srcfolder bin/.dmg-root -ov -format UDZO "bin/${DMG_NAME}.dmg"
          rm -rf bin/.dmg-root

          mkdir -p release-assets
          mv "bin/${DMG_NAME}.dmg" "release-assets/${DMG_NAME}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.label }}
          path: release-assets/*

  build-windows:
    name: Build Windows (${{ matrix.label }})
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            label: x86_64
          - arch: arm64
            label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Download wintun.dll
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/windows | Out-Null
          Invoke-WebRequest -Uri $env:WINTUN_URL -OutFile wintun.zip
          Expand-Archive -LiteralPath wintun.zip -DestinationPath wintun
          $dll = Get-ChildItem -Path wintun -Recurse -Filter wintun.dll | Where-Object { $_.FullName -match '${{ matrix.arch }}' } | Select-Object -First 1
          if (-not $dll) {
            throw "wintun.dll for ${{ matrix.arch }} was not found in the downloaded archive."
          }
          Copy-Item $dll.FullName build/windows/wintun.dll

      - name: Stamp release version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/version: \".*\"/version: \"${VERSION}\"/" build/config.yml
          rm build/config.yml.bak

      - name: Run tests
        if: matrix.arch == 'amd64'
        shell: bash
        run: go test ./...

      - name: Update build assets
        shell: bash
        run: wails3 task common:update:build-assets

      - name: Build Windows binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET_NAME="${APP_NAME}-${VERSION}-windows-${{ matrix.label }}-setup.exe"

          wails3 task common:generate:icons common:build:frontend
          wails3 task windows:generate:syso ARCH=${{ matrix.arch }}

          GOOS=windows \
          CGO_ENABLED=0 \
          GOARCH=${{ matrix.arch }} \
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o "bin/${APP_NAME}.exe" ./cmd/proxyseparator

          rm -f ./*.syso
          mkdir -p release-assets

      - name: Package installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $assetName = "$env:APP_NAME-$version-windows-${{ matrix.label }}-setup.exe"
          $argFlag = if ('${{ matrix.arch }}' -eq 'amd64') { 'AMD64' } else { 'ARM64' }
          $binaryPath = (Resolve-Path "bin/$env:APP_NAME.exe").Path

          wails3 generate webview2bootstrapper -dir "$PWD\build\windows\nsis"
          & makensis "-DARG_WAILS_${argFlag}_BINARY=$binaryPath" "build/windows/nsis/project.nsi"

          $installerPath = Join-Path $PWD "bin/$env:APP_NAME-${{ matrix.arch }}-installer.exe"
          if (-not (Test-Path -LiteralPath $installerPath)) {
            throw "Installer not found at $installerPath."
          }

          Move-Item -LiteralPath $installerPath -Destination (Join-Path "release-assets" $assetName)

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-${{ matrix.label }}
          path: release-assets/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -type f \( -name "*.dmg" -o -name "*.exe" \) -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
